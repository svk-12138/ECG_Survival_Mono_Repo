# 卒中生存分析论文框架推荐配置
# --------------------------------
# 推荐启动方法：
#   python3 scripts/run_survival_training.py --config configs/stroke_survival_thesis.yaml
#
# 使用说明：
# 1. 将 xml_dir 或 csv_dir 改成你的 ECG 数据目录。
# 2. 将 manifest 改成你的 JSON manifest 路径。
# 3. 只改少数关键参数：task_mode / lead_mode / max_time / prediction_horizon。
# 4. 1200 条左右的小样本，优先使用 prediction + 5 折交叉验证。

# 必填：标签文件，字段至少包含 patient_id / time / event
manifest: data/stroke_1113/manifest.json

# 二选一：
xml_dir: /media/lijiajun/DataSet/all/ECGdata/XML
csv_dir: null

# 推荐：prediction 做生存预测；classification 保留为基线对照实验
task_mode: prediction

# 模型架构选择
# resnet        → ResNet1d（论文同款，适合10000+样本）
# cnn_transformer → CNN+Transformer（实验性，参数量过大）
# tcn_light     → TCN轻量版（适合1200样本，参数量~25,000）
model_type: resnet

# 8lead = I, II, V1-V6
# 12lead = I, II, III, aVR, aVL, aVF, V1-V6
lead_mode: 8lead

# 小样本建议减少时间区间数，避免过稀疏
n_intervals: 20

# 按你的随访窗口设置，单位应与 manifest.time 一致
# 医院端11606样本推荐5年窗口（覆盖79.2%事件，761/961例）
# 本地1112样本平均随访3.7年，建议改为 1095.0（3年）
max_time: 1826.25

# 评估5年卒中风险（临床标准，对标葛均波EHJ论文）
# 本地1112样本建议改为 1095.0（3年）
prediction_horizon: 1826.25

# 论文风格预处理
waveform_type: Rhythm
resample_hz: 400.0
apply_filters: true
bandpass_low_hz: 0.5
bandpass_high_hz: 100.0
notch_hz: 60.0
notch_q: 30.0

# 训练参数
target_len: 4096
batch: 32
epochs: 80
lr: 0.0005
dropout: 0.5
weight_decay: 0.0001
num_workers: 0

# 数据集划分比例：
# - 仅在 cv_folds=1 时生效
# - 默认固定为 0.8 / 0.2 / 0.0，即训练/验证，无测试集
train_ratio: 0.8
val_ratio: 0.2
test_ratio: 0.0

# 是否启用交叉验证：
# - 1 表示使用上面的 train/val/test 比例
# - >1 表示启用 K 折交叉验证，此时比例参数会被忽略
cv_folds: 5
cv_seed: 42
train_seed: 42

# 自动根据任务选择早停指标
eval_threshold: 0.5
early_stop_metric: auto
early_stop_patience: 15
early_stop_min_delta: 0.0001
pos_weight_mult: 2.0

# 输出目录
log_dir: outputs/stroke_survival_thesis

# 设备
device: null
use_data_parallel: false
device_ids: null

# 如已做过调参，可切换为 true 并填写 best_params 路径
use_best_params: false
best_params: outputs/stroke_survival_thesis/best_params.json
